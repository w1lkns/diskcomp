name: Build and Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: diskcomp-linux
            binary_path: dist/diskcomp
          - os: macos-latest  
            artifact_name: diskcomp-macos
            binary_path: dist/diskcomp
          - os: windows-latest
            artifact_name: diskcomp-windows.exe
            binary_path: dist/diskcomp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: ./build_binary.sh

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          # Clean previous builds
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          
          # Build with PyInstaller spec
          pyinstaller diskcomp.spec --clean
          
          # Test the binary
          if (Test-Path "dist/diskcomp.exe") {
            Write-Host "✅ Binary built successfully"
            dist/diskcomp.exe --help | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Binary test passed"
            } else {
              Write-Host "❌ Binary test failed"
              exit 1
            }
          } else {
            Write-Host "❌ Binary build failed"
            exit 1
          }
        shell: powershell

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          retention-days: 30

      - name: Attach binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_path }}
          name: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}